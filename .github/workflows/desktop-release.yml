name: Desktop Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-main
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.versions.outputs.version }}
      tag: ${{ steps.versions.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute release version
        id: versions
        run: |
          set -euo pipefail

          version_conf="$(python3 -c 'import json; print(str(json.load(open("src-tauri/tauri.conf.json", "r", encoding="utf-8"))["version"]).strip())')"
          version_cargo="$(python3 -c 'import tomllib; print(str(tomllib.load(open("src-tauri/Cargo.toml", "rb"))["package"]["version"]).strip())')"

          if [ -z "${version_conf}" ] || [ -z "${version_cargo}" ]; then
            echo "Missing version (tauri.conf.json='${version_conf}', Cargo.toml='${version_cargo}')" >&2
            exit 1
          fi

          if [ "${version_conf}" != "${version_cargo}" ]; then
            echo "Version mismatch:" >&2
            echo "  src-tauri/tauri.conf.json: ${version_conf}" >&2
            echo "  src-tauri/Cargo.toml:      ${version_cargo}" >&2
            echo "Please update both files to the same version." >&2
            exit 1
          fi

          if ! [[ "${version_conf}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported version format '${version_conf}'. Expected semver x.y.z." >&2
            exit 1
          fi

          IFS='.' read -r major minor base_patch <<< "${version_conf}"
          tag_glob="v${major}.${minor}.*"
          existing_tags="$(git ls-remote --tags --refs origin "${tag_glob}" | awk -F'/' '{ print $3 }' || true)"

          next_patch="$(
            EXISTING_TAGS="${existing_tags}" python3 -c 'import os,re,sys; major=int(sys.argv[1]); minor=int(sys.argv[2]); base_patch=int(sys.argv[3]); patches=[int(m.group(1)) for t in os.environ.get("EXISTING_TAGS", "").splitlines() if (m:=re.fullmatch(rf"v{major}\.{minor}\.(\d+)", t.strip()))]; print(base_patch if not patches else max(patches)+1)' "${major}" "${minor}" "${base_patch}"
          )"

          version="${major}.${minor}.${next_patch}"
          tag="v${version}"
          if git ls-remote --tags --refs origin "${tag}" | grep -q .; then
            echo "Computed tag already exists on origin: ${tag}" >&2
            exit 1
          fi
          echo "Computed release version: ${version} (${tag})"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Apply release version
        run: node .github/scripts/set_tauri_version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev librsvg2-dev patchelf
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Import Apple certificate
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm -f "$CERT_PATH"

          # Allow codesign to access the keychain
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run tauri:build

      - name: Ad-hoc sign macOS app (fallback when no certificate)
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE == ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          set -euo pipefail
          for app in src-tauri/target/release/bundle/macos/*.app; do
            [ -d "$app" ] || continue
            echo "Ad-hoc signing: $(basename "$app")"
            codesign --force --deep -s - "$app"
          done

      - name: Cleanup Apple keychain
        if: matrix.os == 'macos-latest' && always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "${KEYCHAIN_PATH}" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: error

  build-linux-legacy:
    name: Build Linux Legacy AppImage (glibc 2.35)
    runs-on: ubuntu-22.04
    needs: prepare

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply release version
        run: node .github/scripts/set_tauri_version.mjs "${{ needs.prepare.outputs.version }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libglib2.0-dev librsvg2-dev patchelf pkg-config libssl-dev
          sudo apt-get install -y libwebkit2gtk-4.1-dev || sudo apt-get install -y libwebkit2gtk-4.0-dev
          sudo apt-get install -y libayatana-appindicator3-dev || sudo apt-get install -y libappindicator3-dev

      - name: Install dependencies
        run: npm ci

      - name: Build legacy AppImage
        run: npm run tauri:build -- --bundles appimage

      - name: Mark legacy AppImage variant
        run: |
          set -euo pipefail
          count=0
          for file in src-tauri/target/release/bundle/appimage/*.AppImage; do
            [ -e "${file}" ] || continue
            legacy="${file%.AppImage}_legacy-glibc235.AppImage"
            mv "${file}" "${legacy}"
            echo "Marked legacy AppImage: $(basename "${legacy}")"
            count=$((count + 1))
          done
          if [ "${count}" -lt 1 ]; then
            echo "No AppImage produced for legacy build." >&2
            exit 1
          fi

      - name: Upload legacy Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-linux-legacy
          path: src-tauri/target/release/bundle/appimage/*_legacy-glibc235.AppImage
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build, build-linux-legacy]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          draft: false
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.msi
            artifacts/**/nsis/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.rpm
          fail_on_unmatched_files: true
          append_body: |

            ---
            ### macOS installation note
            If macOS shows **"app is damaged and can't be opened"**, run this command in Terminal:
            ```
            xattr -cr /Applications/Negative\ Converter.app
            ```
            Or: right-click the app → **Open** → click **Open** in the dialog.

      - name: Ensure AWS CLI
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID}" ] || [ -z "${AWS_SECRET_ACCESS_KEY}" ]; then
            echo "No R2 S3 credentials configured; skipping AWS CLI install."
            exit 0
          fi
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y awscli
          aws --version

      - name: Upload installers to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REGION: auto
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${R2_BUCKET}" ]; then
            echo "R2_BUCKET not configured; skipping upload."
            exit 0
          fi

          has_s3="false"
          if [ -n "${AWS_ACCESS_KEY_ID}" ] && [ -n "${AWS_SECRET_ACCESS_KEY}" ] && [ -n "${R2_ENDPOINT}" ]; then
            has_s3="true"
          fi

          has_cf="false"
          if [ -n "${CLOUDFLARE_API_TOKEN}" ] && [ -n "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            has_cf="true"
          fi

          if [ "${has_s3}" != "true" ] && [ "${has_cf}" != "true" ]; then
            echo "R2 credentials not configured; skipping upload."
            echo "Set either (R2_ACCESS_KEY_ID/R2_SECRET_ACCESS_KEY/R2_ENDPOINT) or (CLOUDFLARE_API_TOKEN/CLOUDFLARE_ACCOUNT_ID)."
            exit 0
          fi
          python3 .github/scripts/r2_sync_release.py \
            --source-dir artifacts \
            --bucket "${R2_BUCKET}" \
            --endpoint "${R2_ENDPOINT}" \
            --prefix "negative-converter/release" \
            --tag "${TAG}" \
            --update-latest
